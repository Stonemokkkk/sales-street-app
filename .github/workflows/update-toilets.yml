name: Update Toilet Data

on:
  schedule:
    # Run weekly on Monday at 3:17 AM HKT (UTC+8 = 19:17 UTC Sunday)
    - cron: '17 19 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install Pillow

      - name: Fetch FEHD toilet data
        run: node scripts/build-toilets.mjs
        env:
          FEHD_URL: ${{ secrets.FEHD_URL }}

      - name: Scrape freespace data
        run: node scripts/scrape-freespace.mjs

      - name: Scrape charging data
        run: node scripts/scrape-charging.mjs

      - name: Scrape premium toilet data
        run: node scripts/scrape-premium.mjs

      - name: Generate map PNG
        run: python3 scripts/make_map_pil.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ icons/
          git commit -m "chore: update data from open sources [automated]"
          git push
